name: CI Build Scala Linter
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  scala-linter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: 'false'
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: |
            11
            17
          cache: "maven"
      - name: Run scalafix linting
        # Running tests is required here to avoid linter error
        # "error: SemanticDB not found: src/main/scala/com/exasol/common/file/BucketFSFileChecker.scala"
        run: mvn --batch-mode clean compile test scalafix:scalafix
